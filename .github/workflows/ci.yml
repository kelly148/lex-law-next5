name: CI

# Build Instructions B.4 item 4: Vitest test harness running in CI on every PR.
# This workflow runs on every pull request targeting main and on every push to main
# or any lex-next/* branch.

on:
  push:
    branches:
      - main
      - 'lex-next/**'
  pull_request:
    branches:
      - main

jobs:
  typecheck-and-test:
    name: Type Check + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm/action-setup MUST come before actions/setup-node when using
      # cache: 'pnpm' — setup-node needs pnpm on PATH to configure the cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        # R15 — Type-Safety Integrity: tsc --noEmit must pass with zero errors.
        # strict, exactOptionalPropertyTypes, noUncheckedIndexedAccess, noImplicitOverride
        # are all enforced by tsconfig.json. Relaxing any requires Kelly sign-off.
        run: pnpm typecheck

      - name: Run tests
        # Ch 34.1: Unit + integration + component must run in under 10 minutes.
        # B.4 item 7: Zod Wall Stress Test must pass.
        run: pnpm test
        env:
          # Tests run without a real database — in-memory telemetry mode is enabled
          # by the Vitest setup file (src/server/test-utils/setup.ts).
          SESSION_SECRET: "test-secret-at-least-32-characters-long"
          NODE_ENV: "test"

      - name: Check test coverage (informational)
        # Coverage reports are for operator inspection, not gate criteria (Ch 34.10).
        run: pnpm test:coverage
        continue-on-error: true
        env:
          SESSION_SECRET: "test-secret-at-least-32-characters-long"
          NODE_ENV: "test"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm/action-setup MUST come before actions/setup-node
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true
